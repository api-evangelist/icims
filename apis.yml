aid: icims
name: iCIMS
description: iCIMS is a leading talent cloud company providing applicant tracking and talent acquisition software. The iCIMS
  developer platform provides APIs for integrating with iCIMS Talent Cloud, enabling access to job postings, applicant workflows,
  candidate management, and hiring processes.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - Applicant Tracking
  - HR
  - Recruiting
  - Talent Acquisition
created: '2025-01-08'
modified: '2026-05-19'
url: https://raw.githubusercontent.com/api-evangelist/icims/refs/heads/main/apis.yml
specificationVersion: '0.19'
apis:
  - aid: icims:icims-workflows-api
    name: iCIMS Workflows API
    description: The iCIMS Workflows API allows vendors to interact with various workflows, which connect a Job baseProfile
      and a Person associatedProfile, enabling management of the candidate workflow through the recruitment process.
    humanURL: https://developer-community.icims.com/applications/applicant-tracking/workflows-api
    tags:
    - Applicant Tracking
    - Jobs
    - Workflows
    properties:
    - type: Documentation
      url: https://developer-community.icims.com/applications/applicant-tracking/workflows-api
    - url: openapi/icims-openapi.yml
      type: OpenAPI
    - type: NaftikoCapability
      url: capabilities/icims-workflows.yaml
  - aid: icims:icims-apply-framework-api
    name: iCIMS Apply Framework API
    description: The iCIMS Apply Framework API enables external systems to deliver candidate apply experiences and submit applications
      into the iCIMS Talent Cloud, supporting integrations with job boards, sourcing channels, and partner platforms.
    humanURL: https://developer-community.icims.com/
    tags:
    - Applicant Tracking
    - Apply
    - Jobs
    properties:
    - type: Documentation
      url: https://developer-community.icims.com/
  - aid: icims:icims-marketplace-api
    name: iCIMS Marketplace Integrations API
    description: The iCIMS Marketplace Integrations API enables certified partners to build, publish, and manage integrations
      with the iCIMS Talent Cloud across recruiting, onboarding, assessment, and background screening categories.
    humanURL: https://developer-community.icims.com/
    tags:
    - Applicant Tracking
    - Integrations
    - Marketplace
    properties:
    - type: Documentation
      url: https://developer-community.icims.com/
